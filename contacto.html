<!DOCTYPE html>
<html>
<head>
    <title>Contacto</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(135deg,#1f4037,#99f2c8);
            color:white;
            text-align:center;
        }

        /* MENÚ */
        .menu{
            position:fixed;
            top:0;
            width:100%;
            background:rgba(0,0,0,0.7);
            padding:15px;
        }

        .menu a{
            color:white;
            margin:0 20px;
            text-decoration:none;
            font-weight:bold;
        }

        /* FORMULARIO */
        .formulario{
            margin-top:120px;
        }

        input, textarea{
            width:300px;
            padding:10px;
            margin:10px;
            border:none;
            border-radius:10px;
        }

        button{
            background:#ff6b6b;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            background:#ff4b4b;
        }
    </style>

</head>

<body>

    <!-- MENÚ -->
    <div class="menu">
        <a href="index.html">Inicio</a>
        <a href="galeria.html">Galería</a>
        <a href="contacto.html">Contacto</a>
    </div>

    <!-- FORMULARIO -->
    <div class="formulario">
        <h1>Contáctame</h1>

        <form action="https://formsubmit.co/rosalyhirujo01@gmail.com" method="POST">

            <!-- REDIRECCIÓN -->
            <input type="hidden" name="_next" value="https://rosaly-hirujo.github.io/mi-pagina/index.html">

            <input type="text" name="nombre" placeholder="Tu nombre" required><br>

            <input type="email" name="email" placeholder="Tu correo" required><br>

            <textarea name="mensaje" placeholder="Tu mensaje"></textarea><br>

            <button type="submit">Enviar</button>

        </form>

    </div>

</body>
</html>
