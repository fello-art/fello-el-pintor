}

  position:fixed;

  width:100%;

}

.menu a{

  color:white;

}

.formulario{

  margin-top:120px;

}

input, textarea{

<body>

<div class="formulario">

  <h1>Contact Me</h1>

  <form action="https://formsubmit.co/rosalyhirujo01@gmail.com" method="POST">

    <!-- REDIRECT -->

    <input type="hidden" name="_next" value="https://fello-art.github.io/fello-el-pintor/index.html">

<!-- AUTOMATIC SCRIPT -->

<script>

const params = new URLSearchParams(window.location.search);

const obra = params.get("obra");

if(obra){

  document.getElementById("mensaje").value = "I'm interested in Painting " + obra;

}

</script>
