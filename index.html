<!DOCTYPE html>
<html>
<head>
<title>Galería de Arte</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #134e5e, #71b280);
    color: white;
    margin: 0;
}

/* MENÚ */
nav{
    background: rgba(0,0,0,0.4);
    padding: 15px;
    position: sticky;
    top: 0;
    backdrop-filter: blur(10px);
}

nav a{
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover{
    color: #ff4d4d;
}

/* SECCIONES */
section{
    text-align: center;
    padding: 40px;
}

/* GALERÍA */
.galeria{
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

/* TARJETAS */
.card{
    position: relative;
    width: 260px;
    border-radius: 15px;
    overflow: hidden;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    transition: 0.4s;
}

.card:hover{
    transform: scale(1.05);
}

/* IMAGEN */
.card img{
    width: 100%;
    height: 300px;
    object-fit: cover;
}

/* INFO */
.overlay{
    position: absolute;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    width: 100%;
    transform: translateY(100%);
    transition: 0.4s;
    padding: 10px;
}

.card:hover .overlay{
    transform: translateY(0);
}

/* BOTÓN */
button{
    background: #ff4d4d;
    border: none;
    color: white;
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover{
    background: #ff1a1a;
}

/* MODAL */
.modal{
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    top: 0;
    left: 0;
    text-align: center;
}

.modal img{
    margin-top: 50px;
    max-width: 80%;
}

.modal span{
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 40px;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- MENÚ -->
<nav>
    <a href="#inicio">Inicio</a>
    <a href="#galeria">Galería</a>
    <a href="#ventas">Ventas</a>
    <a href="#contacto">Contacto</a>
</nav>

<!-- INICIO -->
<section id="inicio">
<h1>🎨 Galería de Pinturas</h1>
<p>Artista: Rosaly</p>

<h2>Sobre mí</h2>
<p>Soy una artista apasionada por la pintura, enfocada en paisajes y naturaleza.</p>
</section>

<!-- GALERÍA -->
<section id="galeria">
<h2>Galería</h2>

<div class="galeria">

<div class="card" onclick="abrirModal('cuadro1.jpeg')">
    <img src="cuadro1.jpeg">
    <div class="overlay">
        <h3>Obra 1</h3>
        <p>Acrílico</p>
    </div>
</div>

<div class="card" onclick="abrirModal('cuadro2.jpeg')">
    <img src="cuadro2.jpeg">
    <div class="overlay">
        <h3>Obra 2</h3>
        <p>Óleo</p>
    </div>
</div>

<div class="card" onclick="abrirModal('cuadro3.jpeg')">
    <img src="cuadro3.jpeg">
    <div class="overlay">
        <h3>Obra 3</h3>
        <p>Acuarela</p>
    </div>
</div>

</div>
</section>

<!-- VENTAS -->
<section id="ventas">
<h2>🛒 Obras en venta</h2>

<div class="galeria">

<div class="card">
    <img src="cuadro1.jpeg">
    <div class="overlay">
        <h3>$150 USD</h3>
        <button onclick="comprar()">Comprar</button>
    </div>
</div>

<div class="card">
    <img src="cuadro2.jpeg">
    <div class="overlay">
        <h3>$200 USD</h3>
        <button onclick="comprar()">Comprar</button>
    </div>
</div>

</div>

</section>

<!-- CONTACTO -->
<section id="contacto">
<h2>Contacto</h2>

<p>Email: tuemail@gmail.com</p>

<p>
<a href="https://instagram.com" target="_blank">
<button>Instagram</button>
</a>
</p>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
<span onclick="cerrarModal()">&times;</span>
<img id="imgGrande">
</div>

<script>
function abrirModal(src){
    document.getElementById("modal").style.display="block";
    document.getElementById("imgGrande").src=src;
}

function cerrarModal(){
    document.getElementById("modal").style.display="none";
}

function comprar(){
    alert("Contáctame por WhatsApp o email para comprar");
}
</script>

</body>
</html>
